name: eceuh
description: UH Electrical & Computer Engineering knowledge base — Flutter app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Routing
  go_router: ^14.2.0

  # State
  provider: ^6.1.2

  # Persistence
  shared_preferences: ^2.2.3

  # Networking + downloads
  dio: ^5.4.3+1
  path_provider: ^2.1.3

  # Fonts
  google_fonts: ^6.2.1

  # Native integrations
  share_plus: ^9.0.0
  url_launcher: ^6.3.0

  # PDF / web preview
  webview_flutter: ^4.8.0

  # Optional: Supabase backend (uncomment to enable auth/progress sync)
  # supabase_flutter: ^2.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Bundled fonts — Lora (serif), Inter (sans), JetBrains Mono.
  # Drop the .ttf files into assets/fonts/ and uncomment.
  # fonts:
  #   - family: Lora
  #     fonts:
  #       - asset: assets/fonts/Lora-Regular.ttf
  #       - asset: assets/fonts/Lora-Bold.ttf
  #         weight: 700
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
  #   - family: JetBrainsMono
  #     fonts:
  #       - asset: assets/fonts/JetBrainsMono-Regular.ttf
